// ---------------------------------------------------------
// 1. SETUP: Add the Module to all crewed parts
// ---------------------------------------------------------
PARTUPGRADE
{
    name = kick-life-support-upgrade-CDRA
    partIcon = mk1pod_v2
    techRequired = spaceExploration
    entryCost = 12000
    title = CDRA Scrubber Systems
    basicInfo = Regenerative carbon dioxide removal
    manufacturer = Kick Life Support
    description = Unlocks reusable CDRA scrubbers for crewed spacecraft.
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat]]:FINAL
{
    MODULE
    {
        name = KickLifeSupportModule
        scrubberHeat = 0.25
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:FINAL
{
    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = kickLSScrubberSwitch
        switcherDescription = Atmospheric Control
        switcherDescriptionPlural = Atmospheric Control Systems
        switchInFlight = False
        uiGroupName = KICKLS
        uiGroupDisplayName = Life Support

        SUBTYPE
        {
            name = LiOH
            title = LiOH Scrubbers
            primaryColor = #b7d86a
            secondaryColor = #dfe8b0
            defaultSubtypePriority = 1

            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }

                DATA
                {
                    isCDRA = False
                }
            }
        }

        SUBTYPE
        {
            name = CDRA
            title = Regenerative CDRA
            primaryColor = #6aa7d8
            secondaryColor = #b0d3e8
            upgradeRequired = kick-life-support-upgrade-CDRA

            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }

                DATA
                {
                    isCDRA = True
                }
            }
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],!MODULE[ModuleFuelTanks],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:FINAL
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]
    {
        baseVolume = #$../CrewCapacity$
        @baseVolume *= 0.5

        @SUBTYPE[LiOH]
        {
            RESOURCE
            {
                name = LithiumHydroxide
                unitsPerVolume = 1
            }
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:FINAL
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]
    {
        @SUBTYPE[CDRA]
        {
            addedMass = #$../../CrewCapacity$
            @addedMass *= 0.025
            @addedMass += 0.075
            addedCost = #$../../CrewCapacity$
            @addedCost *= 250
            @addedCost += 750
        }
    }
}

// =========================================================
// THERMAL MODES
// =========================================================
@PART[*]:HAS[@MODULE[ModuleCommand],#CrewCapacity[1],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule]]:FINAL
{
    @MODULE[KickLifeSupportModule]
    {
        avionicsEnabled = true
        avionicsECRate = 0.02
        avionicsHeat = 0.02
        sasECRate = 0.01
        sasHeat = 0.01
        rcsECRate = 0.01
        rcsHeat = 0.01
        // Fan and control electronics
        systemECRate = 0.003
        systemHeat = 0.03
        heaterHeat = 1.0
    }
}

