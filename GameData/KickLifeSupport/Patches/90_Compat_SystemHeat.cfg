@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule]]:NEEDS[SystemHeat]:AFTER[KickLifeSupport]
{
    MODULE
    {
        name = ModuleSystemHeat
        moduleID = kickECS
        volume = #$../CrewCapacity$
        @volume *= 0.001
        iconName = Icon_Gears
        ignoreTemperature = true
    }

    @MODULE[KickLifeSupportModule]
    {
        heatPumpSystemHeatModuleID = kickECS
    }
}
