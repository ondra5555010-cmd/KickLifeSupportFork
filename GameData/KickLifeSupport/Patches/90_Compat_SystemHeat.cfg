@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[KickTemperatureControlModule]]:NEEDS[SystemHeat]:FINAL
{
    MODULE
    {
        name = ModuleSystemHeat
        moduleID = kickECS
        volume = #$../CrewCapacity$
        @volume *= 0.001
        iconName = Icon_Gears
        ignoreTemperature = true
    }

    @MODULE[KickTemperatureControlModule]
    {
        heatPumpSystemHeatModuleID = kickECS
    }
}
