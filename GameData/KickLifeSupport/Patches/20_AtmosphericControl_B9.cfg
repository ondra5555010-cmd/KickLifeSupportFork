@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:NEEDS[B9PartSwitch]:FOR[KickLifeSupport]
{
    @MODULE[KickLifeSupportModule]
    {
        %cabinMassFraction = 0.05
        %airVolumePerSeat = 2000
        %pressurizedCabinPartConductance = 0.001
        %openLoopCabinPartConductance = 0.01
        %unpressurizedCabinPartConductance = 0.1
        %openLoopAtmosphericControlECRate = 0.005
        %liohAtmosphericControlECRate = 0.05
        %zeoliteAtmosphericControlECRate = 0.20
        %solidAmineAtmosphericControlECRate = 0.10
        %poweredAtmosphericControlHeatPerEC = 1.0
        %openLoopOxygenMultiplier = 10.0
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = kickLSScrubberSwitch
        switcherDescription = AtCon
        switcherDescriptionPlural = AtCon Systems
        switchInFlight = False
        uiGroupName = KICKATM
        uiGroupDisplayName = AtCon

        SUBTYPE
        {
            name = UnpressurizedCabin
            title = Unpressurized Cabin
            descriptionSummary = Basic crew accommodations with no pressure vessel or atmospheric control.
            descriptionDetail = <b>Pressure Rating:</b> down to 50.7 kpa\n<b>Cabin-part conductance:</b> High\n<b>CO2 retention:</b> 0%\n<b>CO2 removal:</b> No
            primaryColor = #777777
            secondaryColor = #b8b8b8
            upgradeRequired = kick-life-support-upgrade-UnpressurizedCabin
        }

        SUBTYPE
        {
            name = OpenLoopVenting
            title = Open-Loop Ventilation
            descriptionSummary = A non-vacuum rated pressure cabin with powered open-loop CO2 removal.
            descriptionDetail = <b>Pressure Rating:</b> down to 1 kpa\n<b>Cabin-part conductance:</b> Medium\n<b>CO2 retention:</b> No\n<b>CO2 removal:</b> Up to 0.005 L/s per seat\n<b>Power:</b> Up to 0.005 EC/s per occupied seat\n<b>Consumable:</b> Oxygen, up to 10x\n<b>Byproduct:</b> Vented cabin air and electrical heat
            primaryColor = #4AA3DF
            secondaryColor = #c8efff
            defaultSubtypePriority = 1
            upgradeRequired = kick-life-support-upgrade-OpenLoopVenting
        }

        SUBTYPE
        {
            name = PressurizedCabin
            title = Pressurized Cabin
            descriptionSummary = A sealed pressure cabin that extends the vessel atmosphere without adding CO2-removal capacity.
            descriptionDetail = <b>Pressure Rating:</b> Full\n<b>Cabin-part conductance:</b> Low\n<b>CO2 retention:</b> Yes\n<b>CO2 removal:</b> None\n<b>Power:</b> None\n<b>Consumable:</b> None\n<b>Byproduct:</b> None
            primaryColor = #D9D9D9
            secondaryColor = #FFFFFF
            upgradeRequired = kick-life-support-upgrade-PressurizedCabin
        }

        SUBTYPE
        {
            name = LiOH
            title = LiOH Scrubber
            descriptionSummary = A reliable consumable scrubber for short-duration sealed spacecraft.
            descriptionDetail = <b>Pressure Rating:</b> Full\n<b>Cabin-part conductance:</b> Low\n<b>CO2 retention:</b> Yes\n<b>CO2 removal:</b> Up to 0.005 L/s per seat\n<b>Power:</b> Up to 0.050 EC/s per occupied seat\n<b>Consumable:</b> Lithium Hydroxide cartridge\n<b>Byproduct:</b> Waste and reaction heat
            primaryColor = #6FBF4A
            secondaryColor = #d7efbd
            upgradeRequired = kick-life-support-upgrade-LiOH
        }

        SUBTYPE
        {
            name = Zeolite
            title = Zeolite Molecular Sieve
            descriptionSummary = A robust regenerative scrubber that trades high mass and power use for unlimited operation.
            descriptionDetail = <b>Pressure Rating:</b> Full\n<b>Cabin-part conductance:</b> Low\n<b>CO2 retention:</b> Yes\n<b>CO2 removal:</b> Up to 0.005 L/s per seat\n<b>Power:</b> Up to 0.200 EC/s per occupied seat\n<b>Consumable:</b> None\n<b>Byproduct:</b> Collected CO2 and electrical heat
            primaryColor = #D89A2B
            secondaryColor = #f1d28b
            upgradeRequired = kick-life-support-upgrade-Zeolite
        }

        SUBTYPE
        {
            name = SolidAmine
            title = Solid Amine Swingbed
            descriptionSummary = A lightweight regenerative scrubber with lower power demand and a substantially higher price.
            descriptionDetail = <b>Pressure Rating:</b> Full\n<b>Cabin-part conductance:</b> Low\n<b>CO2 retention:</b> Yes\n<b>CO2 removal:</b> Up to 0.005 L/s per seat\n<b>Power:</b> Up to 0.100 EC/s per occupied seat\n<b>Consumable:</b> None\n<b>Byproduct:</b> Collected CO2 and electrical heat
            primaryColor = #C65A9E
            secondaryColor = #edb8d8
            upgradeRequired = kick-life-support-upgrade-SolidAmine
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],!MODULE[ModuleFuelTanks],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:NEEDS[B9PartSwitch]:FOR[KickLifeSupport]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]
    {
        baseVolume = #$../CrewCapacity$
        @baseVolume *= 0.5

        @SUBTYPE[OpenLoopVenting]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }

        @SUBTYPE[PressurizedCabin]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }

        @SUBTYPE[LiOH]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }

            RESOURCE
            {
                name = LithiumHydroxide
                unitsPerVolume = 1
            }
        }

        @SUBTYPE[Zeolite]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }

        @SUBTYPE[SolidAmine]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:NEEDS[B9PartSwitch]:FOR[KickLifeSupport]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]
    {
        @SUBTYPE[UnpressurizedCabin]
        {
            addedMass = #$../../mass$
            @addedMass *= -0.1
            addedCost = #$../../cost$
            @addedCost *= -0.2
        }

        @SUBTYPE[OpenLoopVenting]
        {
            addedMass = #$../../mass$
            @addedMass *= -0.05
            addedCost = #$../../cost$
            @addedCost *= -0.075
        }

        @SUBTYPE[PressurizedCabin]
        {
            addedMass = #$../../mass$
            @addedMass *= -0.03
            addedCost = #$../../cost$
            @addedCost *= -0.05
        }

        @SUBTYPE[Zeolite]
        {
            addedMass = #$../../CrewCapacity$
            @addedMass *= 0.025
            @addedMass += 0.075
            addedCost = #$../../CrewCapacity$
            @addedCost *= 250
            @addedCost += 750
        }

        @SUBTYPE[SolidAmine]
        {
            addedMass = #$../../CrewCapacity$
            @addedMass *= 0.015
            @addedMass += 0.05
            addedCost = #$../../CrewCapacity$
            @addedCost *= 750
            @addedCost += 1250
        }
    }
}
