@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:FINAL
{
    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = kickLSScrubberSwitch
        switcherDescription = Atmospheric Control
        switcherDescriptionPlural = Atmospheric Control Systems
        switchInFlight = False
        uiGroupName = KICKATM
        uiGroupDisplayName = Atmospheric Control

        SUBTYPE
        {
            name = UnpressurizedCabin
            title = Unpressurized Cabin
            primaryColor = #777777
            secondaryColor = #b8b8b8

            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }

                DATA
                {
                    atmosphereControlMode = 0
                    atmosphericControlECRate = 0
                    atmosphericControlHeatPerEC = 0
                }
            }
        }

        SUBTYPE
        {
            name = PartiallyPressurizedCabin
            title = Partially Pressurized Cabin
            primaryColor = #4F8C75
            secondaryColor = #b7d8c8

            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }

                DATA
                {
                    atmosphereControlMode = 6
                    atmosphericControlECRate = 0
                    atmosphericControlHeatPerEC = 0
                }
            }
        }

        SUBTYPE
        {
            name = OpenLoopVenting
            title = Open-Loop Venting
            primaryColor = #4AA3DF
            secondaryColor = #c8efff
            defaultSubtypePriority = 1

            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }

                DATA
                {
                    atmosphereControlMode = 2
                    atmosphericControlECRate = 0.005
                    atmosphericControlHeatPerEC = 1
                }
            }
        }

        SUBTYPE
        {
            name = PressurizedCabin
            title = Pressurized Cabin
            primaryColor = #2E8B8B
            secondaryColor = #95d6d6

            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }

                DATA
                {
                    atmosphereControlMode = 1
                    atmosphericControlECRate = 0
                    atmosphericControlHeatPerEC = 0
                }
            }
        }

        SUBTYPE
        {
            name = LiOH
            title = LiOH Scrubber
            primaryColor = #6FBF4A
            secondaryColor = #d7efbd
            upgradeRequired = kick-life-support-upgrade-LiOH

            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }

                DATA
                {
                    atmosphereControlMode = 3
                    atmosphericControlECRate = 0.05
                    atmosphericControlHeatPerEC = 1
                }
            }
        }

        SUBTYPE
        {
            name = Zeolite
            title = Zeolite Molecular Sieve
            primaryColor = #D89A2B
            secondaryColor = #f1d28b
            upgradeRequired = kick-life-support-upgrade-Zeolite

            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }

                DATA
                {
                    atmosphereControlMode = 4
                    atmosphericControlECRate = 0.20
                    atmosphericControlHeatPerEC = 1
                }
            }
        }

        SUBTYPE
        {
            name = SolidAmine
            title = Solid Amine Swingbed
            primaryColor = #C65A9E
            secondaryColor = #edb8d8
            upgradeRequired = kick-life-support-upgrade-SolidAmine

            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }

                DATA
                {
                    atmosphereControlMode = 5
                    atmosphericControlECRate = 0.10
                    atmosphericControlHeatPerEC = 1
                }
            }
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],!MODULE[ModuleFuelTanks],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:FINAL
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]
    {
        baseVolume = #$../CrewCapacity$
        @baseVolume *= 0.5

        @SUBTYPE[PartiallyPressurizedCabin]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }

        @SUBTYPE[PressurizedCabin]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }

        @SUBTYPE[OpenLoopVenting]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }

        @SUBTYPE[LiOH]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }

            RESOURCE
            {
                name = LithiumHydroxide
                unitsPerVolume = 1
            }
        }

        @SUBTYPE[Zeolite]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }

        @SUBTYPE[SolidAmine]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:FINAL
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]
    {
        @SUBTYPE[UnpressurizedCabin]
        {
            addedMass = #$../../mass$
            @addedMass *= -0.1
            addedCost = #$../../cost$
            @addedCost *= -0.2
        }

        @SUBTYPE[PartiallyPressurizedCabin]
        {
            addedMass = #$../../mass$
            @addedMass *= -0.075
            addedCost = #$../../cost$
            @addedCost *= -0.125
        }

        @SUBTYPE[PressurizedCabin]
        {
            addedMass = #$../../mass$
            @addedMass *= -0.03
            addedCost = #$../../cost$
            @addedCost *= -0.05
        }

        @SUBTYPE[OpenLoopVenting]
        {
            addedMass = #$../../mass$
            @addedMass *= -0.05
            addedCost = #$../../cost$
            @addedCost *= -0.075
        }

        @SUBTYPE[Zeolite]
        {
            addedMass = #$../../CrewCapacity$
            @addedMass *= 0.025
            @addedMass += 0.075
            addedCost = #$../../CrewCapacity$
            @addedCost *= 250
            @addedCost += 750
        }

        @SUBTYPE[SolidAmine]
        {
            addedMass = #$../../CrewCapacity$
            @addedMass *= 0.015
            @addedMass += 0.05
            addedCost = #$../../CrewCapacity$
            @addedCost *= 750
            @addedCost += 1250
        }
    }
}
