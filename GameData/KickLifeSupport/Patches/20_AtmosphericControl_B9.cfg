@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:NEEDS[B9PartSwitch]:FOR[KickLifeSupport]
{
    @MODULE[KickLifeSupportModule]
    {
        %cabinMassFraction = 0.05
        %airVolumePerSeat = 2000
        %cabinPartConductance = 0.001
        %atmosphereControlMode = 0
        %atmosphereControlSystemName = 
        %atmosphericControlECRate = 0
        %atmosphericControlHeatPerEC = 0
        %oxygenWastePerCO2Removed = 0
        %useMaxCapacity = false
        %pressureMinimumKPa = 0
        %canUseAmbient = false
        %retainsCO2 = true
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = kickLSScrubberSwitch
        switcherDescription = Atmospheric Control
        switcherDescriptionPlural = Atmospheric Control Systems
        switchInFlight = False
        uiGroupName = KICKATM
        uiGroupDisplayName = Atmospheric Control

        SUBTYPE
        {
            name = UnpressurizedCabin
            title = Unpressurized Cabin
            descriptionSummary = Basic crew accommodations with no pressure vessel or atmospheric control.
            descriptionDetail = <b>Ambient breathing:</b> Yes\n<b>Pressure minimum:</b> 26 kpa\n<b>Cabin-part conductance:</b> High\n<b>CO2 retention:</b> No
            primaryColor = #777777
            secondaryColor = #b8b8b8
            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }
                DATA
                {
                    atmosphereControlMode = 0
                    atmosphereControlSystemName = Unpressurized Cabin
                    atmosphericControlECRate = 0
                    atmosphericControlHeatPerEC = 0
                    oxygenWastePerCO2Removed = 0
                    pressureMinimumKPa = 26
                    cabinPartConductance = 0.1
                    canUseAmbient = true
                    retainsCO2 = false
                }
            }
        }

        SUBTYPE
        {
            name = OpenLoopVenting
            title = Open-Loop Ventilation
            descriptionSummary = A non-vacuum rated pressure cabin with powered open-loop CO2 removal.
            descriptionDetail = <b>Ambient breathing:</b> Yes\n<b>Pressure Rating:</b> down to 2 kpa\n<b>Cabin-part conductance:</b> Medium\n<b>CO2 retention:</b> Yes\n<b>CO2 removal:</b> Up to 0.005 L/s per seat\n<b>EC:</b> Up to 0.005 EC/s per occupied seat\n<b>Consumable:</b> Oxygen, up to 11 units per unit of CO2 removed outside ambient-breathing conditions\n<b>Byproduct:</b> Electrical heat
            primaryColor = #4AA3DF
            secondaryColor = #c8efff
            defaultSubtypePriority = 1
            upgradeRequired = kick-life-support-upgrade-OpenLoopVenting
            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }
                DATA
                {
                    atmosphereControlMode = 1
                    atmosphereControlSystemName = Open-Loop Ventilation
                    atmosphericControlECRate = 0.005
                    atmosphericControlHeatPerEC = 1.0
                    oxygenWastePerCO2Removed = 11
                    pressureMinimumKPa = 2
                    cabinPartConductance = 0.01
                    canUseAmbient = true
                    retainsCO2 = true
                }
            }
        }

        SUBTYPE
        {
            name = PressurizedCabin
            title = Pressurized Cabin
            descriptionSummary = A sealed pressure cabin without any CO2-removal capacity.
            descriptionDetail = <b>Ambient breathing:</b> No\n<b>Pressure Rating:</b> Full\n<b>Cabin-part conductance:</b> Low\n<b>CO2 retention:</b> Yes\n<b>CO2 removal:</b> None\n<b>EC:</b> None\n<b>Consumable:</b> None\n<b>Byproduct:</b> None
            primaryColor = #D9D9D9
            secondaryColor = #FFFFFF
            upgradeRequired = kick-life-support-upgrade-PressurizedCabin
            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }
                DATA
                {
                    atmosphereControlMode = 0
                    atmosphereControlSystemName = Pressurized Cabin
                    atmosphericControlECRate = 0
                    atmosphericControlHeatPerEC = 0
                    oxygenWastePerCO2Removed = 0
                    pressureMinimumKPa = 0
                    cabinPartConductance = 0.001
                    canUseAmbient = false
                    retainsCO2 = true
                }
            }
        }

        SUBTYPE
        {
            name = LiOH
            title = LiOH Scrubber
            descriptionSummary = A reliable consumable scrubber for short-duration sealed spacecraft.
            descriptionDetail = <b>Ambient breathing:</b> No\n<b>Pressure Rating:</b> Full\n<b>Cabin-part conductance:</b> Low\n<b>CO2 retention:</b> Yes\n<b>CO2 removal:</b> Up to 0.005 L/s per seat\n<b>EC:</b> Up to 0.050 EC/s per occupied seat\n<b>Consumable:</b> Lithium Hydroxide cartridge\n<b>Byproduct:</b> Waste, electrical and reaction heat
            primaryColor = #6FBF4A
            secondaryColor = #d7efbd
            upgradeRequired = kick-life-support-upgrade-LiOH
            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }
                DATA
                {
                    atmosphereControlMode = 2
                    atmosphereControlSystemName = LiOH Scrubber
                    atmosphericControlECRate = 0.05
                    atmosphericControlHeatPerEC = 1.0
                    oxygenWastePerCO2Removed = 0
                    pressureMinimumKPa = 0
                    cabinPartConductance = 0.001
                    canUseAmbient = false
                    retainsCO2 = true
                }
            }
        }

        SUBTYPE
        {
            name = Zeolite
            title = Zeolite Molecular Sieve
            descriptionSummary = A robust regenerative scrubber that trades high mass and power use for unlimited operation.
            descriptionDetail = <b>Ambient breathing:</b> No\n<b>Pressure Rating:</b> Full\n<b>Cabin-part conductance:</b> Low\n<b>CO2 retention:</b> Yes\n<b>CO2 removal:</b> Up to 0.005 L/s per seat\n<b>EC:</b> Up to 0.200 EC/s per occupied seat\n<b>Consumable:</b> None\n<b>Byproduct:</b> Collected CO2 and electrical heat
            primaryColor = #D89A2B
            secondaryColor = #f1d28b
            upgradeRequired = kick-life-support-upgrade-Zeolite
            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }
                DATA
                {
                    atmosphereControlMode = 3
                    atmosphereControlSystemName = Zeolite Molecular Sieve
                    atmosphericControlECRate = 0.20
                    atmosphericControlHeatPerEC = 1.0
                    oxygenWastePerCO2Removed = 0
                    pressureMinimumKPa = 0
                    cabinPartConductance = 0.001
                    canUseAmbient = false
                    retainsCO2 = true
                }
            }
        }

        SUBTYPE
        {
            name = SolidAmine
            title = Solid Amine Swingbed
            descriptionSummary = A lightweight regenerative scrubber with lower power demand but comes with substantially higher pricetag.
            descriptionDetail = <b>Ambient breathing:</b> No\n<b>Pressure Rating:</b> Full\n<b>Cabin-part conductance:</b> Low\n<b>CO2 retention:</b> Yes\n<b>CO2 removal:</b> Up to 0.005 L/s per seat\n<b>Power:</b> Up to 0.100 EC/s per occupied seat\n<b>Consumable:</b> None\n<b>Byproduct:</b> Collected CO2 and electrical heat
            primaryColor = #C65A9E
            secondaryColor = #edb8d8
            upgradeRequired = kick-life-support-upgrade-SolidAmine
            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }
                DATA
                {
                    atmosphereControlMode = 3
                    atmosphereControlSystemName = Solid Amine Swingbed
                    atmosphericControlECRate = 0.10
                    atmosphericControlHeatPerEC = 1.0
                    oxygenWastePerCO2Removed = 0
                    pressureMinimumKPa = 0
                    cabinPartConductance = 0.001
                    canUseAmbient = false
                    retainsCO2 = true
                }
            }
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],!MODULE[ModuleFuelTanks],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:NEEDS[B9PartSwitch]:FOR[KickLifeSupport]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]
    {
        baseVolume = #$../CrewCapacity$
        @baseVolume *= 0.5

        @SUBTYPE[OpenLoopVenting]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }

        @SUBTYPE[PressurizedCabin]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }

        @SUBTYPE[LiOH]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }

            RESOURCE
            {
                name = LithiumHydroxide
                unitsPerVolume = 1
            }
        }

        @SUBTYPE[Zeolite]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }

        @SUBTYPE[SolidAmine]
        {
            RESOURCE
            {
                name = Oxygen
                unitsPerVolume = 200
            }
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]]:NEEDS[B9PartSwitch]:FOR[KickLifeSupport]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickLSScrubberSwitch]]
    {
        @SUBTYPE[UnpressurizedCabin]
        {
            addedMass = #$../../mass$
            @addedMass *= -0.1
            addedCost = #$../../cost$
            @addedCost *= -0.2
        }

        @SUBTYPE[OpenLoopVenting]
        {
            addedMass = #$../../mass$
            @addedMass *= -0.05
            addedCost = #$../../cost$
            @addedCost *= -0.075
        }

        @SUBTYPE[PressurizedCabin]
        {
            addedMass = #$../../mass$
            @addedMass *= -0.03
            addedCost = #$../../cost$
            @addedCost *= -0.05
        }

        @SUBTYPE[Zeolite]
        {
            addedMass = #$../../CrewCapacity$
            @addedMass *= 0.025
            @addedMass += 0.075
            addedCost = #$../../CrewCapacity$
            @addedCost *= 250
            @addedCost += 750
        }

        @SUBTYPE[SolidAmine]
        {
            addedMass = #$../../CrewCapacity$
            @addedMass *= 0.015
            @addedMass += 0.05
            addedCost = #$../../CrewCapacity$
            @addedCost *= 750
            @addedCost += 1250
        }
    }
}
