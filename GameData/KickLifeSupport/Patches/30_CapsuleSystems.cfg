@PART[*]:HAS[#CrewCapacity[3],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule]]:FOR[KickLifeSupport]
{
    @MODULE[KickLifeSupportModule]
    {
        // Fan and control electronics
        systemECRate = 0.003
        systemHeat = 0.003
        enconMaxECRate = 3.0
        enconECLimit = 3.0
        heaterMaxECRate = 3.0
        heaterHeatPerEC = 1.0
        heatPumpMaxECRate = 0.3
        heatPumpHeatPerEC = 10.0
    }
}

@PART[*]:HAS[@MODULE[ModuleCommand],#CrewCapacity[3],!MODULE[KerbalSeat],@MODULE[KickAvionicsModule]]:FOR[KickLifeSupport]
{
    @MODULE[KickAvionicsModule]
    {
        avionicsEnabled = true
        avionicsECRate = 0.02
        avionicsHeat = 0.02
        sasECRate = 0.01
        sasHeat = 0.01
        rcsECRate = 0.01
        rcsHeat = 0.01
    }
}

@PART[*]:HAS[#CrewCapacity[>3],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule]]:FOR[KickLifeSupport]
{
    @MODULE[KickLifeSupportModule]
    {
        // Fan and control electronics
        systemECRate = 0.003
        systemHeat = 0.003
        enconMaxECRate = #$../CrewCapacity$
        enconECLimit = #$../CrewCapacity$
        heaterMaxECRate = #$../CrewCapacity$
        heaterHeatPerEC = 1.0
        heatPumpMaxECRate = #$../CrewCapacity$
        @heatPumpMaxECRate *= 0.1
        heatPumpHeatPerEC = 10.0
    }
}

@PART[*]:HAS[@MODULE[ModuleCommand],#CrewCapacity[>3],!MODULE[KerbalSeat],@MODULE[KickAvionicsModule]]:FOR[KickLifeSupport]
{
    @MODULE[KickAvionicsModule]
    {
        avionicsEnabled = true
        avionicsECRate = 0.2
        avionicsHeat = 0.02
        sasECRate = 0.1
        sasHeat = 0.01
        rcsECRate = 0.1
        rcsHeat = 0.01
    }
}
