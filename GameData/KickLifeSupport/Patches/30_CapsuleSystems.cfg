@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule]]:FOR[KickLifeSupport]
{
    @MODULE[KickLifeSupportModule]
    {
        %thermostatTemp = #$@KICKLS_SETTINGS/THERMOSTAT_DEFAULT$
    }
}

@PART[*]:HAS[#CrewCapacity[1],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule]]:FOR[KickLifeSupport]
{
    @MODULE[KickLifeSupportModule]
    {
        // Environmental-control electronics
        systemECRate = 0.003
        systemHeat = 0.003
        enconMaxECRate = 1.0
        enconECLimit = 1.0
        heaterMaxECRate = 1.0
        heaterHeatPerEC = 1.0
        heatPumpMaxECRate = 0.1
        heatPumpHeatPerEC = 10.0
    }
}

@PART[*]:HAS[@MODULE[ModuleCommand],#CrewCapacity[1],!MODULE[KerbalSeat],@MODULE[KickAvionicsModule]]:FOR[KickLifeSupport]
{
    @MODULE[KickAvionicsModule]
    {
        avionicsEnabled = true
        avionicsECRate = 0.02
        avionicsHeat = 0.02
        sasECRate = 0.01
        sasHeat = 0.01
        rcsECRate = 0.01
        rcsHeat = 0.01
    }
}

@PART[*]:HAS[#CrewCapacity[2],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule]]:FOR[KickLifeSupport]
{
    @MODULE[KickLifeSupportModule]
    {
        // Environmental-control electronics
        systemECRate = 0.003
        systemHeat = 0.003
        enconMaxECRate = 2.0
        enconECLimit = 2.0
        heaterMaxECRate = 2.0
        heaterHeatPerEC = 1.0
        heatPumpMaxECRate = 0.2
