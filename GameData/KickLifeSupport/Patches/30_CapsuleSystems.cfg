@PART[*]:HAS[#CrewCapacity[1],!MODULE[KerbalSeat],@MODULE[KickTemperatureControlModule]]:FINAL
{
    @MODULE[KickTemperatureControlModule]
    {
        // Fan and control electronics
        systemECRate = 0.003
        systemHeat = 0.03
        heaterHeat = 1.0
    }
}

@PART[*]:HAS[@MODULE[ModuleCommand],#CrewCapacity[1],!MODULE[KerbalSeat],@MODULE[KickAvionicsModule]]:FINAL
{
    @MODULE[KickAvionicsModule]
    {
        avionicsEnabled = true
        avionicsECRate = 0.02
        avionicsHeat = 0.02
        sasECRate = 0.01
        sasHeat = 0.01
        rcsECRate = 0.01
        rcsHeat = 0.01
    }
}

