    }
}

@PART[*]:HAS[@MODULE[ModuleCommand],#CrewCapacity[2],!MODULE[KerbalSeat],@MODULE[KickAvionicsModule]]:FOR[KickLifeSupport]
{
    @MODULE[KickAvionicsModule]
    {
