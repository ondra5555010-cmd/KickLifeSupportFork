@DYNAMICBATTERYSTORAGE:NEEDS[DynamicBatteryStorage]:FINAL
{
    HANDLERCATEGORY
    {
        name = AtmosphericControl
        title = Atmospheric Control
        module = KickLifeSupportModule
    }

    HANDLERCATEGORY
    {
        name = EnvironmentalControl
        title = Environmental Control
        module = KickTemperatureControlModule
    }

    HANDLERCATEGORY
    {
        name = Avionics
        title = Avionics
        module = KickAvionicsModule
    }

    PARTMODULEHANDLER
    {
        name = KickLifeSupportModule
        type = Power
        handlerModuleName = GenericFieldDataHandler
        visible = true
        solarEfficiencyEffects = false
        producer = false
        consumer = true
        simulated = true
        continuous = true

        HANDLER_CONFIG
        {
            editorFieldName = dbsLifeSupportECRate
            flightFieldName = dbsLifeSupportECRate
            editorValueScalar = -1.0
            flightValueScalar = -1.0
        }
    }

    PARTMODULEHANDLER
    {
        name = KickTemperatureControlModule
        type = Power
        handlerModuleName = GenericFieldDataHandler
        visible = true
        solarEfficiencyEffects = false
        producer = false
        consumer = true
        simulated = true
        continuous = true

        HANDLER_CONFIG
        {
            editorFieldName = dbsTemperatureControlECRate
            flightFieldName = dbsTemperatureControlECRate
            editorValueScalar = -1.0
            flightValueScalar = -1.0
        }
    }

    PARTMODULEHANDLER
    {
        name = KickAvionicsModule
        type = Power
        handlerModuleName = GenericFieldDataHandler
        visible = true
        solarEfficiencyEffects = false
        producer = false
        consumer = true
        simulated = true
        continuous = true

        HANDLER_CONFIG
        {
            editorFieldName = dbsAvionicsECRate
            flightFieldName = dbsAvionicsECRate
            editorValueScalar = -1.0
            flightValueScalar = -1.0
        }
    }
}
