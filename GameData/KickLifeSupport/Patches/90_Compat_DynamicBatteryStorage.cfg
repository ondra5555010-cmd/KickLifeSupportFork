@DYNAMICBATTERYSTORAGE:NEEDS[DynamicBatteryStorage]:AFTER[KickLifeSupport]
{
    HANDLERCATEGORY
    {
        name = LifeSupport
        title = Life Support
        module = KickLifeSupportModule
    }

    HANDLERCATEGORY
    {
        name = Avionics
        title = Avionics
        module = KickAvionicsModule
    }

    PARTMODULEHANDLER
    {
        name = KickLifeSupportModule
        type = Power
        handlerModuleName = GenericFieldDataHandler
        visible = true
        solarEfficiencyEffects = false
        producer = false
        consumer = true
        simulated = true
        continuous = true

        HANDLER_CONFIG
        {
            editorFieldName = dbsTotalECRate
            flightFieldName = dbsTotalECRate
            editorValueScalar = -1.0
            flightValueScalar = -1.0
        }
    }

    PARTMODULEHANDLER
    {
        name = KickAvionicsModule
        type = Power
        handlerModuleName = GenericFieldDataHandler
        visible = true
        solarEfficiencyEffects = false
        producer = false
        consumer = true
        simulated = true
        continuous = true

        HANDLER_CONFIG
        {
            editorFieldName = dbsAvionicsECRate
            flightFieldName = dbsAvionicsECRate
            editorValueScalar = -1.0
            flightValueScalar = -1.0
        }
    }
}
