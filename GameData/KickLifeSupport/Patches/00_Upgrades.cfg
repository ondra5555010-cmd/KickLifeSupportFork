//Atmospheric

PARTUPGRADE
{
    name = kick-life-support-upgrade-UnpressurizedCabin
    partIcon = KickLSLiOHCartridge
    techRequired = start
    entryCost = 0
    title = Unpressurized Cabins
    basicInfo = Basic crew accommodations
    manufacturer = Kick Life Support
    description = Basic crew accommodations with no pressure vessel or atmospheric control. Occupants breathe ambient air where it is sufficiently dense and oxygenated. It doesn't have issues with CO2 retention.
}

PARTUPGRADE
{
    name = kick-life-support-upgrade-OpenLoopVenting
    partIcon = KickLSLiOHCartridge
    techRequired = engineering101
    entryCost = 2000
    title = Open-Loop Ventilation
    basicInfo = Powered open-loop atmospheric control
    manufacturer = Kick Life Support
    description = A non-vacuum rated pressure cabin. CO2 must be removed by powered open-loop ventilation using up to 0.005 EC/s per occupied seat. Ventilation uses ambient air without wasting stored oxygen where the atmosphere is breathable; elsewhere it can consume up to ten times the normal oxygen supply.
}

