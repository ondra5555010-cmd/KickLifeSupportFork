// Atmospheric Control upgrades

PARTUPGRADE
{
    name = kick-life-support-upgrade-OpenLoopVenting
    partIcon = KickLSLiOHCartridge
    techRequired = engineering101
    entryCost = 2000
    title = Open-Loop Ventilation
    basicInfo = Powered open-loop atmospheric control
    manufacturer = Kerbal Integrated Circuit Kompany
    description = A powered ventilation system for low-pressure aircraft and high-altitude vehicles. It removes carbon dioxide by exchanging cabin air with the outside atmosphere whenever possible. The downsize is that it also vents useful oxygen overboard when assisted breathing is active. Though in safe environments it uses oxygen acquired from it.
}

PARTUPGRADE
{
    name = kick-life-support-upgrade-PressurizedCabin
    partIcon = KickLSLiOHCartridge
    techRequired = survivability
    entryCost = 0
    title = Pressurized Cabins
    basicInfo = Sealed crew compartments
    manufacturer = Kerbal Integrated Circuit Kompany
    description = A sealed, well-insulated cabin that allows you to expands habitable volume without adding CO2-removal capacity.
}

PARTUPGRADE
{
    name = kick-life-support-upgrade-LiOH
    partIcon = KickLSLiOHCartridge
    techRequired = survivability
    entryCost = 4000
    title = LiOH Scrubber Systems
    basicInfo = Consumable carbon dioxide removal
    manufacturer = Kerbal Integrated Circuit Kompany
    description = A reliable consumable scrubber for short-duration sealed spacecraft. It removes CO2 using replaceable lithium hydroxide cartridges.
}

PARTUPGRADE
{
    name = kick-life-support-upgrade-Zeolite
    partIcon = KickLSLiOHCartridge
    techRequired = spaceExploration
    entryCost = 8000
    title = Zeolite Molecular Sieve Systems
    basicInfo = Regenerative carbon dioxide removal
    manufacturer = Kerbal Integrated Circuit Kompany
    description = A regenerative molecular sieve that repeatedly captures and releases carbon dioxide without disposable cartridges. Although heavier and more power-hungry than earlier systems, it can support missions of virtually unlimited duration as long as sufficient electrical power is available.
}

PARTUPGRADE
{
    name = kick-life-support-upgrade-SolidAmine
    partIcon = KickLSLiOHCartridge
    techRequired = advExploration
    entryCost = 16000
    title = Solid Amine Swingbed Systems
    basicInfo = Lightweight regenerative carbon dioxide removal
    manufacturer = Kerbal Integrated Circuit Kompany
    description = An advanced regenerative scrubber that removes carbon dioxide using solid amine sorbents. Compared to earlier regenerative systems it is lighter, more compact, and more energy efficient, making it ideal for modern spacecraft despite its higher cost.
}

// Environmental Control upgrades

PARTUPGRADE
{
    name = kick-life-support-upgrade-AirCooling
    partIcon = KickLSLiOHCartridge
    techRequired = engineering101
    entryCost = 500
    title = Air Cooling Systems
    basicInfo = Atmospheric cabin cooling
    manufacturer = Kerbal Integrated Circuit Kompany
    description = Uses the surrounding atmosphere to carry heat away from the cabin. Highly effective during atmospheric flight, it becomes progressively less useful with increasing altitude and cannot operate in the vacuum of space.
}

PARTUPGRADE
{
    name = kick-life-support-upgrade-WaterEvaporator
    partIcon = KickLSLiOHCartridge
    techRequired = engineering101
    entryCost = 1000
    title = Water Evaporator Systems
    basicInfo = Consumable heat rejection
    manufacturer = Kerbal Integrated Circuit Kompany
    description = Rejects excess heat by boiling water (be it fresh water or waste water) into space or a near vacuum. It provides reliable cooling without requiring large radiators. Extra water not included.
}

PARTUPGRADE
{
    name = kick-life-support-upgrade-CoolantLoop
    partIcon = KickLSLiOHCartridge
    techRequired = survivability
    entryCost = 2000
    title = Pumped Coolant Loop Systems
    basicInfo = Pumped spacecraft heat transport
    manufacturer = Kerbal Integrated Circuit Kompany
    description = Circulates coolant through the spacecraft to collect heat from crew compartments and onboard equipment before delivering it to external radiators. It provides continuous cooling without consuming expendables, but depends on adequate radiator capacity to reject the collected heat.
}
