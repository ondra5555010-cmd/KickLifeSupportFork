@PART[*]:HAS[#CrewCapacity[>3],!MODULE[KerbalSeat],@MODULE[ModuleFuelTanks]]:NEEDS[RealFuels]:FOR[KickLifeSupport]
{
    @MODULE[ModuleFuelTanks]
    {
        @volume += 2000
        TANK
        {
            name = Oxygen
            amount = full
            maxAmount = 400
        }
        TANK
        {
            name = Food
            amount = full
            maxAmount = 4
        }
        TANK
        {
            name = Water
            amount = full
            maxAmount = 4
        }
        TANK
        {
            name = WasteWater
            amount = 0.0
            maxAmount = 4
        }
        TANK
        {
            name = Waste
            amount = 0.0
            maxAmount = 50
        }
        TANK
        {
            name = LithiumHydroxide
            amount = full
            maxAmount = #$../../CrewCapacity$
            @maxAmount *= 0.5
        }
    }
}
