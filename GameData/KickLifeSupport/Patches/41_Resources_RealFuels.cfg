@PART[*]:HAS[#CrewCapacity[1],!MODULE[KerbalSeat],@MODULE[ModuleFuelTanks]]:NEEDS[RealFuels]:FOR[KickLifeSupport]
{
    @MODULE[ModuleFuelTanks]
    {
        @volume += 500
        TANK
        {
            name = Oxygen
            amount = full
            maxAmount = 100
        }
        TANK
        {
            name = Food
            amount = full
            maxAmount = 1
        }
        TANK
        {
            name = Water
            amount = full
            maxAmount = 1
        }
        TANK
        {
            name = WasteWater
            amount = 0.0
            maxAmount = 1
        }
        TANK
        {
            name = Waste
            amount = 0.0
            maxAmount = 5
        }
        TANK
        {
            name = LithiumHydroxide
            amount = full
            maxAmount = 0.5
        }
    }
}

