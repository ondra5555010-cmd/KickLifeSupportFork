@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule],@MODULE[ModuleSystemHeat]:HAS[#moduleID[kickECS]],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]]:NEEDS[SystemHeat,B9PartSwitch]:AFTER[KickLifeSupport]
{
    @MODULE[KickLifeSupportModule]
    {
        %waterEvaporatorMaxECRate = #$../CrewCapacity$
        @waterEvaporatorMaxECRate *= 0.01
        %waterEvaporatorHeatPerEC = 100
        %waterEvaporatorMaxWaterRate = #$../CrewCapacity$
        @waterEvaporatorMaxWaterRate *= 0.000435
        %waterEvaporatorWaterLimit = #$../CrewCapacity$
        @waterEvaporatorWaterLimit *= 0.000435
        %waterEvaporatorEfficiency = 0.9
        %airCoolingMaxECRate = #$../CrewCapacity$
        @airCoolingMaxECRate *= 0.05
        %airCoolingHeatPerEC = 5
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = kickThermalControlSwitch
        switcherDescription = EnCon System
        switcherDescriptionPlural = EnCon Systems
        switchInFlight = False
        uiGroupName = KICKTHERM
        uiGroupDisplayName = EnCon - Systems

        SUBTYPE
        {
            name = WaterEvaporator
            title = Water Evaporator
            primaryColor = #4E8FB5
            secondaryColor = #D9F4FF
        }

        SUBTYPE
        {
            name = AirCooling
            title = Air Cooling
            primaryColor = #66AFC7
            secondaryColor = #D7F5F8
        }

        SUBTYPE
        {
            name = Basic
            title = Passive
            primaryColor = #777777
            secondaryColor = #b8b8b8
        }

        SUBTYPE
        {
            name = HeatPump
            title = Coolant Loop
            primaryColor = #4AA3DF
            secondaryColor = #c8efff
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]]:NEEDS[SystemHeat,B9PartSwitch]:AFTER[KickLifeSupport]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]
    {
        @SUBTYPE[Basic]
        {
            addedCost = #$../../cost$
            @addedCost *= -0.05
        }

        @SUBTYPE[HeatPump]
        {
            addedCost = #$../../CrewCapacity$
            @addedCost *= 250
            @addedCost += 750
        }
    }
}
