@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule],@MODULE[ModuleSystemHeat]:HAS[#moduleID[kickECS]],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]]:NEEDS[SystemHeat,B9PartSwitch]:AFTER[KickLifeSupport]
{
    @MODULE[KickLifeSupportModule]
    {
        %waterEvaporatorMaxECRate = #$../CrewCapacity$
        @waterEvaporatorMaxECRate *= 0.01
        %waterEvaporatorHeatPerEC = 100
        %waterEvaporatorMaxWaterRate = #$../CrewCapacity$
        @waterEvaporatorMaxWaterRate *= 0.000435
        %waterEvaporatorWaterLimit = #$../CrewCapacity$
        @waterEvaporatorWaterLimit *= 0.000435
        %airCoolingMaxECRate = #$../CrewCapacity$
        @airCoolingMaxECRate *= 0.05
        %airCoolingHeatPerEC = 5
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = kickThermalControlSwitch
        switcherDescription = EnCon System
        switcherDescriptionPlural = EnCon Systems
        switchInFlight = False
        uiGroupName = KICKTHERM
        uiGroupDisplayName = EnCon - Systems

        SUBTYPE
        {
            name = WaterEvaporator
            title = Water Evaporator
            descriptionSummary = Rejects cabin heat by boiling water or wastewater into space.
            descriptionDetail = <b>Heating:</b> Up to 1.00 kW per seat at 1.00 EC/s per seat\n<b>Cooling:</b> Up to 1.00 kW per seat at 0.010 EC/s per seat\n<b>Primary Mechanism:</b> Evaporative cooling\n<b>Environment:</b> Operates below 0.6 kPa\n<b>Consumable:</b> Water or WasteWater, up to 0.000435 L/s per seat\n<b>Byproduct:</b> WasteWater provides 80% cooling efficiency and leaves 20% Waste
            primaryColor = #4E8FB5
            secondaryColor = #D9F4FF
            upgradeRequired = kick-life-support-upgrade-WaterEvaporator
        }

        SUBTYPE
        {
            name = AirCooling
            title = Air Cooling
            descriptionSummary = Uses the surrounding atmosphere as a heat sink for aircraft and low-altitude vehicles.
            descriptionDetail = <b>Heating:</b> Up to 1.00 kW per seat at 1.00 EC/s per seat\n<b>Cooling:</b> Up to 0.25 kW per seat at 0.050 EC/s per seat\n<b>Primary Mechanism:</b> Atmospheric heat exchange\n<b>Environment:</b> Starts at 1.0 kPa; reaches full output at 20.0 kPa\n<b>Consumable:</b> None\n<b>Byproduct:</b> None
            primaryColor = #66AFC7
            secondaryColor = #D7F5F8
            upgradeRequired = kick-life-support-upgrade-AirCooling
        }

        SUBTYPE
        {
            name = Basic
            title = Passive
            descriptionSummary = Basic thermal control that relies on heat exchange with the vehicle, with an electric cabin heater for cold conditions.
            descriptionDetail = <b>Heating:</b> Up to 1.00 kW per seat at 1.00 EC/s per seat\n<b>Cooling:</b> Passive cabin-part exchange only\n<b>Primary Mechanism:</b> Cabin-part heat exchange\n<b>Environment:</b> Any\n<b>Consumable:</b> None\n<b>Byproduct:</b> None
            primaryColor = #777777
            secondaryColor = #b8b8b8
            upgradeRequired = kick-life-support-upgrade-PassiveThermalControl
        }

        SUBTYPE
        {
            name = HeatPump
            title = Coolant Loop
            descriptionSummary = Pumps cabin heat into a coolant loop for rejection by external radiators.
            descriptionDetail = <b>Heating:</b> Up to 1.00 kW per seat at 1.00 EC/s per seat\n<b>Cooling:</b> Transfers up to 1.00 kW per seat at 0.100 EC/s per seat\n<b>Primary Mechanism:</b> Pumped coolant transfer\n<b>Environment:</b> Any\n<b>Consumable:</b> None\n<b>Byproduct:</b> None
            primaryColor = #27B8C8
            secondaryColor = #BFEFF3
            upgradeRequired = kick-life-support-upgrade-CoolantLoop
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]]:NEEDS[SystemHeat,B9PartSwitch]:AFTER[KickLifeSupport]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]
    {
        @SUBTYPE[Basic]
        {
            addedCost = #$../../cost$
            @addedCost *= -0.05
        }

        @SUBTYPE[HeatPump]
        {
            addedCost = #$../../CrewCapacity$
            @addedCost *= 250
            @addedCost += 250
        }
    }
}
