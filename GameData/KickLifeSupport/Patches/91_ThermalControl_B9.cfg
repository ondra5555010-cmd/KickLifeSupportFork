@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[KickTemperatureControlModule],@MODULE[ModuleSystemHeat]:HAS[#moduleID[kickECS]],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]]:NEEDS[SystemHeat,B9PartSwitch]:FINAL
{
    @MODULE[KickTemperatureControlModule]
    {
        %waterEvaporatorHeat = #$../CrewCapacity$
        %waterEvaporatorECRate = #$../CrewCapacity$
        @waterEvaporatorECRate *= 0.01
        %airCoolingHeat = #$../CrewCapacity$
        @airCoolingHeat *= 0.25
        %airCoolingECRate = #$../CrewCapacity$
        @airCoolingECRate *= 0.05
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = kickThermalControlSwitch
        switcherDescription = Thermal Control
        switcherDescriptionPlural = Thermal Control Systems
        switchInFlight = False
        uiGroupName = KICKTEMP
        uiGroupDisplayName = Environmental Control

        SUBTYPE
        {
            name = WaterEvaporator
            title = Water Evaporator
            primaryColor = #4E8FB5
            secondaryColor = #D9F4FF

            MODULE
            {
                IDENTIFIER
                {
                    name = KickTemperatureControlModule
                }

                DATA
                {
                    heatPumpAvailable = false
                    waterEvaporatorAvailable = true
                    airCoolingAvailable = false
                }
            }
        }

        SUBTYPE
        {
            name = AirCooling
            title = Air Cooling
            primaryColor = #66AFC7
            secondaryColor = #D7F5F8

            MODULE
            {
                IDENTIFIER
                {
                    name = KickTemperatureControlModule
                }

                DATA
                {
                    heatPumpAvailable = false
                    waterEvaporatorAvailable = false
                    airCoolingAvailable = true
                }
            }
        }

        SUBTYPE
        {
            name = Basic
            title = Passive
            primaryColor = #777777
            secondaryColor = #b8b8b8

            MODULE
            {
                IDENTIFIER
                {
                    name = KickTemperatureControlModule
                }

                DATA
                {
                    heatPumpAvailable = false
                    waterEvaporatorAvailable = false
                    airCoolingAvailable = false
                }
            }
        }

        SUBTYPE
        {
            name = HeatPump
            title = Coolant Loop
            primaryColor = #4AA3DF
            secondaryColor = #c8efff

            MODULE
            {
                IDENTIFIER
                {
                    name = KickTemperatureControlModule
                }

                DATA
                {
                    heatPumpAvailable = true
                    waterEvaporatorAvailable = false
                    airCoolingAvailable = false
                }
            }
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]]:NEEDS[SystemHeat,B9PartSwitch]:FINAL
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]
    {
        @SUBTYPE[Basic]
        {
            addedCost = #$../../cost$
            @addedCost *= -0.05
        }

        @SUBTYPE[HeatPump]
        {
            addedCost = #$../../CrewCapacity$
            @addedCost *= 250
            @addedCost += 750
        }
    }
}
