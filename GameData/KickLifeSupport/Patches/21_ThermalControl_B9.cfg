@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[KickLifeSupportModule],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]]:NEEDS[SystemHeat,B9PartSwitch]:AFTER[KickLifeSupport]
{
    @MODULE[KickLifeSupportModule]
    {
        %coolingSystemMode = 0
        %coolingSystemName = Passive
        %coolingMaxECRatePerSeat = 0
        %coolingHeatPerEC = 0
        %coolingMaxWaterRatePerSeat = 0
        %waterEvaporatorWaterLimit = #$../CrewCapacity$
        @waterEvaporatorWaterLimit *= 0.000435
        %coolingPressureMinimumKPa = 0
        %coolingPressureFullKPa = 0
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = kickThermalControlSwitch
        switcherDescription = Environmental Control
        switcherDescriptionPlural = Environmental Control Systems
        switchInFlight = False
        uiGroupName = KICKTHERM
        uiGroupDisplayName = Environmental Control - Systems
		
		SUBTYPE
        {
            name = Passive
            title = Passive
            descriptionSummary = Basic thermal control that relies on heat exchange with the vehicle, with an electric cabin heater for cold conditions.
            descriptionDetail = <b>Heating Capacity:</b> 1.00 kW per seat\n<b>Heating EC Cost:</b> 1.00 EC/s per seat\n<b>Cooling Capacity:</b> None\n<b>Cooling EC Cost:</b> None\n<b>Cooling Consumables:</b> None\n<b>Special:</b> Passive cabin-part exchange only
            primaryColor = #777777
            secondaryColor = #b8b8b8
            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }
                DATA
                {
                    coolingSystemMode = 0
                    coolingSystemName = Passive
                    coolingMaxECRatePerSeat = 0
                    coolingHeatPerEC = 0
                    coolingMaxWaterRatePerSeat = 0
                    coolingPressureMinimumKPa = 0
                    coolingPressureFullKPa = 0
                }
            }
        }

		SUBTYPE
        {
            name = AirCooling
            title = Air Cooling
            descriptionSummary = Uses the surrounding atmosphere as a heat sink for aircraft and low-altitude vehicles.
            descriptionDetail = <b>Heating Capacity:</b> 1.00 kW per seat\n<b>Heating EC Cost:</b> 1.00 EC/s per seat\n<b>Cooling Capacity:</b> 1.00 kW per seat\n<b>Cooling EC Cost:</b> 0.200 EC/s per seat\n<b>Cooling Consumables:</b> None\n<b>Special:</b> Starts at 1.0 kPa and reaches full output at ambient pressure
            primaryColor = #87CEEB
            secondaryColor = #DDF5FF
            upgradeRequired = kick-life-support-upgrade-AirCooling
            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }
                DATA
                {
                    coolingSystemMode = 1
                    coolingSystemName = Air Cooling
                    coolingMaxECRatePerSeat = 0.2
                    coolingHeatPerEC = 5
                    coolingMaxWaterRatePerSeat = 0
                    coolingPressureMinimumKPa = #$@KICKLS_SETTINGS/AIR_COOLING_MIN_PRESSURE$
                    coolingPressureFullKPa = #$@KICKLS_SETTINGS/AIR_COOLING_FULL_PRESSURE$
                }
            }
        }
		
		SUBTYPE
        {
            name = WaterEvaporator
            title = Water Evaporator
            descriptionSummary = Rejects cabin heat by boiling water or wastewater into space.
            descriptionDetail = <b>Heating Capacity:</b> 1.00 kW per seat\n<b>Heating EC Cost:</b> 1.00 EC/s per seat\n<b>Cooling Capacity:</b> 1.00 kW per seat\n<b>Cooling EC Cost:</b> 0.010 EC/s per seat\n<b>Cooling Consumables:</b> Water or WasteWater, up to 0.000435 L/s per seat\n<b>Special:</b> Operates below 0.6 kPa; WasteWater provides 80% cooling and leaves 20% Waste
            primaryColor = #1F4E79
            secondaryColor = #9EC3E6
            upgradeRequired = kick-life-support-upgrade-WaterEvaporator
            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }
                DATA
                {
                    coolingSystemMode = 1
                    coolingSystemName = Water Evaporator
                    coolingMaxECRatePerSeat = 0.01
                    coolingHeatPerEC = 100
                    coolingMaxWaterRatePerSeat = 0.000435
                    coolingPressureMinimumKPa = #$@KICKLS_SETTINGS/WATER_EVAPORATOR_PRESSURE_LIMIT$
                    coolingPressureFullKPa = 0
                }
            }
        }

        SUBTYPE
        {
            name = CoolantLoop
            title = Pumped Coolant Loop
            descriptionSummary = Pumps cabin heat into a coolant loop for rejection by external radiators.
            descriptionDetail = <b>Heating Capacity:</b> 1.00 kW per seat\n<b>Heating EC Cost:</b> 1.00 EC/s per seat\n<b>Cooling Capacity:</b> 1.00 kW per seat\n<b>Cooling EC Cost:</b> 0.100 EC/s per seat\n<b>Cooling Consumables:</b> None\n<b>Special:</b> Requires an external radiator loop
            primaryColor = #2E8B8B
            secondaryColor = #BFE8E1
            upgradeRequired = kick-life-support-upgrade-CoolantLoop
            MODULE
            {
                IDENTIFIER
                {
                    name = KickLifeSupportModule
                }
                DATA
                {
                    coolingSystemMode = 2
                    coolingSystemName = Pumped Coolant Loop
                    coolingMaxECRatePerSeat = 0.1
                    coolingHeatPerEC = 10
                    coolingMaxWaterRatePerSeat = 0
                    coolingPressureMinimumKPa = 0
                    coolingPressureFullKPa = 0
                }
            }
        }
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]]:NEEDS[SystemHeat,B9PartSwitch]:AFTER[KickLifeSupport]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[kickThermalControlSwitch]]
    {
        @SUBTYPE[Passive]
        {
            addedCost = #$../../cost$
            @addedCost *= -0.05
        }

        @SUBTYPE[CoolantLoop]
        {
            addedCost = #$../../CrewCapacity$
            @addedCost *= 250
            @addedCost += 250
        }
    }
}
