@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat]]:FINAL
{
    MODULE
    {
        name = KickLifeSupportModule
        scrubberHeat = 0.25
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],!MODULE[KickTemperatureControlModule]]:FINAL
{
    MODULE
    {
        name = KickTemperatureControlModule
    }
}

@PART[*]:HAS[@MODULE[ModuleCommand],#CrewCapacity[>0],!MODULE[KerbalSeat],!MODULE[KickAvionicsModule]]:FINAL
{
    MODULE
    {
        name = KickAvionicsModule
    }
}

@PART[*]:HAS[@MODULE[KerbalSeat],!MODULE[KickAvionicsModule]]:FINAL
{
    MODULE
    {
        name = KickAvionicsModule
        avionicsEnabled = true
        avionicsECRate = 0.02
        avionicsHeat = 0.02
        sasECRate = 0.01
        sasHeat = 0.01
        rcsECRate = 0.01
        rcsHeat = 0.01
    }
}
