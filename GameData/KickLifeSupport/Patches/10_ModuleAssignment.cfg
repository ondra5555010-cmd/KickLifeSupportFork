@PART[*]:HAS[@MODULE[ModuleCommand],#CrewCapacity[>0],!MODULE[KerbalSeat],!MODULE[KickAvionicsModule]]:FOR[KickLifeSupport]
{
    MODULE
    {
        name = KickAvionicsModule
    }
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[KerbalSeat],!MODULE[KickLifeSupportModule]]:FOR[KickLifeSupport]
{
    MODULE
    {
        name = KickLifeSupportModule
    }
}

@PART[*]:HAS[@MODULE[KerbalSeat],!MODULE[KickAvionicsModule]]:FOR[KickLifeSupport]
{
    MODULE
    {
        name = KickAvionicsModule
        avionicsEnabled = true
        avionicsECRate = 0.02
        avionicsHeat = 0.02
        sasECRate = 0.01
        sasHeat = 0.01
        rcsECRate = 0.01
        rcsHeat = 0.01
    }
}
